services:
  next-whois-ui:
    image: programzmh/next-whois-ui:latest
    container_name: next-whois-ui
    restart: unless-stopped
    ports:
      - "6007:3000"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      NEXT_PUBLIC_SITE_TITLE: "Next Whois"
      NEXT_PUBLIC_SITE_DESCRIPTION: "A fast, modern WHOIS/RDAP lookup tool"
      NEXT_PUBLIC_SITE_KEYWORDS: "whois,rdap,domain,ip,asn,cidr"
      NEXT_PUBLIC_HISTORY_LIMIT: "-1"
      NEXT_PUBLIC_MAX_WHOIS_FOLLOW: "0"

      MOZ_ACCESS_ID: ""
      MOZ_SECRET_KEY: ""

      # 使用宿主机上已映射出来的 Redis
      REDIS_HOST: host.docker.internal
      REDIS_PORT: "6003"
      REDIS_PASSWORD: "Wlgyredis6688a"
      REDIS_DB: "0"
      REDIS_CACHE_TTL: "3600"
